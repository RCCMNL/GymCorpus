name: gym_corpus
description: "A new Flutter project for GYM 2.0"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dartz: ^0.10.1
  drift: ^2.14.0
  equatable: ^2.0.5
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.9
  freezed_annotation: any
  get_it: ^7.6.4
  go_router: ^12.1.1
  google_sign_in: 7.1.0
  health: ^13.3.1
  image_picker: ^1.2.1
  injectable: any
  intl: ^0.20.2
  json_annotation: any
  local_auth: ^3.0.1
  path: ^1.8.3
  path_provider: ^2.1.1
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2
  sign_in_with_apple: ^7.0.1
  sqlite3_flutter_libs: ^0.5.18
  video_player: ^2.8.1

dev_dependencies:
  alchemist: ^0.3.0
  bloc_test: ^9.1.5
  build_runner: ^2.4.6
  drift_dev: ^2.14.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  freezed: any
  injectable_generator: any
  json_serializable: any
  mocktail: ^1.0.1
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#08082f"
  image: "assets/images/logo.png"
  android_12:
    color: "#08082f"
    image: "assets/images/logo.png"
  web: false

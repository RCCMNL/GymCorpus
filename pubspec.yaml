name: gym_corpus
description: "A new Flutter project for GYM 2.0"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local DB
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # UI / Assets
  flutter_svg: ^2.0.9
  video_player: ^2.8.1

  # Routing
  go_router: ^12.1.1

  # Functional / Either
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.6.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # DB Generation
  drift_dev: ^2.14.0
  build_runner: ^2.4.6

  # Testing
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  alchemist: ^0.3.0 # Consider using for golden tests
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
